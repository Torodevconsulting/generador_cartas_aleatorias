<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./assets/img/4geeks.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Cartas Aleatorias</title>

    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
      integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container py-4 text-center">
      <h1 class="mb-4">Generador de Cartas Aleatorias</h1>

     
      <div id="cardContainer" class="card mx-auto">
        <div class="card-suit" id="suitTop"></div>
        <div class="card-value" id="cardValue"></div>
        <div class="card-suit" id="suitBottom"></div>
      </div>

     
      <div class="size-controls mt-4 d-flex justify-content-center gap-3">
        <div>
          <label for="cardWidth">Ancho (px):</label>
          <input type="number" id="cardWidth" value="120" min="80" max="300" class="form-control" />
        </div>
        <div>
          <label for="cardHeight">Alto (px):</label>
          <input type="number" id="cardHeight" value="180" min="120" max="450" class="form-control" />
        </div>
      </div>

    
      <div class="mt-4">
        <button id="generateCard" class="btn btn-primary me-3">Nueva Carta</button>
        <span id="timerDisplay" class="timer-badge">Próxima carta en: <strong id="countdown">10</strong>s</span>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
